<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Proktor | CBT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "Segoe UI", Arial, sans-serif;
      background:#f1f3f6;
      color:#333;
    }

    header{
      background:#0f4c81;
      color:white;
      padding:16px 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    header h1{
      margin:0;
      font-size:20px;
      font-weight:600;
    }
    header .user{
      font-size:13px;
      opacity:.9;
    }

    .container{
      display:flex;
      min-height:calc(100vh - 60px);
    }

    aside{
      width:240px;
      background:#ffffff;
      border-right:1px solid #ddd;
      padding:20px 0;
    }
    aside h3{
      margin:0 20px 10px;
      font-size:14px;
      color:#666;
      text-transform:uppercase;
    }
    aside a{
      display:block;
      padding:12px 20px;
      color:#333;
      text-decoration:none;
      font-size:14px;
      cursor:pointer;
    }
    aside a:hover,
    aside a.active{
      background:#eef5ff;
      color:#0f4c81;
      font-weight:600;
    }

    main{
      flex:1;
      padding:24px;
    }

    .card{
      background:white;
      border-radius:8px;
      padding:20px;
      box-shadow:0 2px 6px rgba(0,0,0,.08);
      margin-bottom:20px;
    }

    .card h2{
      margin-top:0;
      font-size:16px;
      color:#0f4c81;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }
    th, td{
      border:1px solid #ddd;
      padding:10px;
      text-align:center;
    }
    th{
      background:#f5f7fa;
      font-weight:600;
    }

    .status-login{color:#0f4c81;font-weight:600}
    .status-mengerjakan{color:#d97706;font-weight:600}
    .status-selesai{color:#059669;font-weight:600}
    .status-aktif{color:#059669;font-weight:600}
    .status-nonaktif{color:#d9534f;font-weight:600}

    button{
      padding:6px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-size:13px;
    }
    .btn-reset{
      background:#d9534f;
      color:white;
    }

    footer{
      text-align:center;
      font-size:12px;
      color:#777;
      margin-top:20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Dashboard Proktor CBT</h1>
  <div class="user">
    Proktor aktif | <span id="emailProktor"></span>
  </div>
</header>

<div class="container">

  <aside>
    <h3>Menu Proktor</h3>
    <a class="active" onclick="showMonitoring()">Monitoring Peserta</a>
    <a onclick="showBankSoal()">Status Ujian</a>
    <a>Rekap Nilai</a>
    <a onclick="logout()">Logout</a>
  </aside>

  <main>

    <!-- MONITORING PESERTA -->
    <div class="card" id="monitoringCard">
      <h2>Status Peserta Ujian</h2>
      <table>
        <thead>
          <tr>
            <th>Email Peserta</th>
            <th>Status</th>
            <th>Update Terakhir</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="dataPeserta">
          <tr><td colspan="4">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- BANK SOAL -->
    <div class="card" id="bankSoalCard" style="display:none">
      <h2>Bank Soal Ujian</h2>
      <button onclick="aktifkanTes()">Aktifkan Tes</button>
      <table style="margin-top:15px">
        <thead>
          <tr>
            <th>ID Soal</th>
            <th>Domain</th>
            <th>Tipe</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="dataBankSoal">
          <tr><td colspan="4">Memuat bank soal...</td></tr>
        </tbody>
      </table>
    </div>

    <footer>
      © 2026 Sistem CBT Sekolah
    </footer>

  </main>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzhYhmgEliEpmgfyGGeM4iYnQSnLMrPJaRaPfws-wXy36NAXdJ5Z4AbLUDyzliW3Ios_w/exec";

const emailProktor = localStorage.getItem("email");
const role = localStorage.getItem("role");

if (!emailProktor || role !== "proktor") {
  alert("Akses ditolak");
  location.href = "login.html";
}
document.getElementById("emailProktor").innerText = emailProktor;

/* ===== MENU SWITCH ===== */
function showMonitoring(){
  document.getElementById("monitoringCard").style.display="block";
  document.getElementById("bankSoalCard").style.display="none";
}
function showBankSoal(){
  document.getElementById("monitoringCard").style.display="none";
  document.getElementById("bankSoalCard").style.display="block";
  loadBankSoal();
}

/* ===== MONITORING PESERTA ===== */
async function loadPeserta(){
  const res = await fetch(API_URL + "?action=getStatus");
  const json = await res.json();
  const tbody = document.getElementById("dataPeserta");
  tbody.innerHTML="";
  if(!json.success || json.data.length===0){
    tbody.innerHTML="<tr><td colspan='4'>Belum ada peserta</td></tr>";
    return;
  }
  json.data.forEach(p=>{
    tbody.innerHTML+=`
      <tr>
        <td>${p.email}</td>
        <td class="status-${p.status}">${p.status}</td>
        <td>${p.waktu}</td>
        <td><button class="btn-reset" onclick="resetPeserta('${p.email}')">Reset</button></td>
      </tr>`;
  });
}
async function resetPeserta(email){
  if(!confirm("Reset peserta ini?")) return;
  await fetch(API_URL+"?action=resetPeserta&email="+encodeURIComponent(email));
  loadPeserta();
}

/* ===== BANK SOAL ===== */
async function loadBankSoal(){
  const res = await fetch(API_URL+"?action=getBankSoal");
  const json = await res.json();
  const tbody=document.getElementById("dataBankSoal");
  tbody.innerHTML="";
  json.data.forEach(s=>{
    const st = s.status==="Aktif"?"status-aktif":"status-nonaktif";
    tbody.innerHTML+=`
      <tr>
        <td>${s.id_soal}</td>
        <td>${s.domain}</td>
        <td>${s.tipe_soal}</td>
        <td class="${st}">${s.status||"Nonaktif"}</td>
      </tr>`;
  });
}
async function aktifkanTes(){
  if(!confirm("Aktifkan tes sekarang?")) return;
  const res = await fetch(API_URL+"?action=aktifkanTes");
  const json = await res.json();
  alert(json.message);
  loadBankSoal();
}

/* ===== LOGOUT ===== */
function logout(){
  localStorage.clear();
  location.href="login.html";
}

loadPeserta();
setInterval(loadPeserta,5000);
</script>

</body>
</html>
