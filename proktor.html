<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Proktor</title>
  <style>
    body { font-family: Arial; background:#f4f4f4; }
    h2 { color:#0f4c81; }
    table {
      width:100%; border-collapse: collapse; background:#fff;
    }
    th, td {
      border:1px solid #ccc; padding:8px; text-align:center;
    }
    th { background:#eef5ff; }
    button {
      padding:6px 10px; background:#d9534f;
      color:#fff; border:none; cursor:pointer;
    }
  </style>
</head>
<body>

<h2>DASHBOARD PROKTOR – MONITOR UJIAN</h2>

<table>
  <thead>
    <tr>
      <th>Email Peserta</th>
      <th>Status</th>
      <th>Update Terakhir</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody id="data"></tbody>
</table>

<script>
const API = "https://script.google.com/macros/s/AKfycbzhYhmgEliEpmgfyGGeM4iYnQSnLMrPJaRaPfws-wXy36NAXdJ5Z4AbLUDyzliW3Ios_w/exec";

function loadStatus() {
  fetch(API, {
    method: "POST",
    body: JSON.stringify({ action: "getStatus" })
  })
  .then(r => r.json())
  .then(res => {
    let html = "";
    res.data.forEach(p => {
      html += `
        <tr>
          <td>${p.email}</td>
          <td>${p.status}</td>
          <td>${p.last_update}</td>
          <td>
            <button onclick="reset('${p.email}')">Reset</button>
          </td>
        </tr>
      `;
    });
    document.getElementById("data").innerHTML = html;
  });
}

function reset(email) {
  if (!confirm("Reset peserta ini?")) return;

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "resetPeserta",
      email: email
    })
  })
  .then(() => loadStatus());
}

// Refresh otomatis setiap 5 detik
setInterval(loadStatus, 5000);
loadStatus();
</script>

</body>
</html>
