<h3>UJIAN CBT</h3>
<div id="soal"></div>

<script>
const API_URL = "PASTE_URL_APPS_SCRIPT";

fetch(API_URL, {
  method: "POST",
  body: JSON.stringify({ action: "getSoal" })
})
.then(r => r.json())
.then(data => {
  let html = "";
  data.soal.forEach(s => {
    html += `
      <p>${s.pertanyaan}</p>
      <button>A. ${s.A}</button>
      <button>B. ${s.B}</button>
      <button>C. ${s.C}</button>
      <button>D. ${s.D}</button>
      <hr>
    `;
  });
  soal.innerHTML = html;
});
</script>
