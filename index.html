<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login CBT / ANBK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Supabase CDN -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2;
    }

    .container {
      max-width: 400px;
      margin: 80px auto;
      background: #fff;
      padding: 30px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #0f4c81;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      font-size: 14px;
      color: #555;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      font-size: 15px;
      background: #0f4c81;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #09385f;
    }

    .msg {
      margin-top: 15px;
      text-align: center;
      font-size: 13px;
      color: red;
    }

    footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>LOGIN CBT</h1>
    <p>Asesmen Nasional Berbasis Komputer</p>

    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <button onclick="login()">Masuk</button>

    <div class="msg" id="msg"></div>
  </div>

  <footer>
    © 2026 Panitia CBT Sekolah
  </footer>

  <script>
    // 🔴 GANTI DENGAN DATA SUPABASE ANDA
    const SUPABASE_URL = "https://XXXX.supabase.co"
    const SUPABASE_ANON_KEY = "PUBLIC_ANON_KEY"

    const supabase = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    )

    async function login() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const msg = document.getElementById('msg')

      msg.innerText = 'Memproses login...'

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      })

      if (error) {
        msg.innerText = error.message
        return
      }

      // Ambil role user
      const { data: profile } = await supabase
        .from('profiles')
        .select('role')
        .eq('id', data.user.id)
        .single()

      if (!profile) {
        msg.innerText = 'Role pengguna tidak ditemukan'
        return
      }

      // Redirect berdasarkan role
      if (profile.role === 'proktor' || profile.role === 'admin') {
        window.location.href = 'proktor.html'
      } else {
        window.location.href = 'token.html'
      }
    }
  </script>

</body>
</html>
