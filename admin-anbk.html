<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin ANBK | Dashboard Nasional</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:#eef1f5;color:#333}
header{background:#1e3a8a;color:white;padding:18px 28px;display:flex;justify-content:space-between;align-items:center}
header h1{margin:0;font-size:20px}
header .user{font-size:13px;opacity:.9}

.layout{display:flex;min-height:calc(100vh - 64px)}

aside{width:260px;background:#fff;border-right:1px solid #ddd;padding:22px 0}
aside h3{margin:0 24px 12px;font-size:12px;color:#666;text-transform:uppercase}
aside a{display:block;padding:12px 24px;color:#333;text-decoration:none;cursor:pointer}
aside a.active,aside a:hover{background:#eef5ff;color:#1e3a8a;font-weight:600}

main{flex:1;padding:28px}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.card .value{font-size:26px;font-weight:600;color:#1e3a8a}

.section{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.08);margin-top:20px;display:none}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:6px;text-align:center;vertical-align:top}
th{background:#f4f6fa}

textarea,input,select,button{font-size:12px;padding:6px;width:100%}
button{background:#1e3a8a;color:white;border:none;border-radius:6px;cursor:pointer;width:auto}

.status{font-weight:bold}
.green{color:#059669}
.red{color:#b00020}

/* SPINNER */
.overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(255,255,255,.7);
  display:none;align-items:center;justify-content:center;
  z-index:9999;
}
.spinner{
  width:60px;height:60px;
  border:6px solid #ccc;
  border-top:6px solid #1e3a8a;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="overlay" id="overlay"><div class="spinner"></div></div>

<header>
  <h1>ADMIN ANBK – DASHBOARD NASIONAL</h1>
  <div class="user"><span id="adminEmail"></span> | Admin ANBK</div>
</header>

<div class="layout">

<aside>
  <h3>Menu Admin</h3>
  <a class="active" onclick="showSection('dashboard')">Dashboard</a>
  <a onclick="showSection('proktor')">Manajemen Proktor</a>
  <a onclick="showSection('banksoal')">Bank Soal</a>
  <a onclick="logout()">Logout</a>
</aside>

<main>

<!-- DASHBOARD -->
<div id="dashboard" class="section" style="display:block">
  <div class="cards">
    <div class="card"><h4>Total Proktor</h4><div class="value" id="totalProktor">-</div></div>
    <div class="card"><h4>Peserta Aktif</h4><div class="value" id="pesertaAktif">-</div></div>
  </div>
</div>

<!-- PROKTOR (UTUH) -->
<div id="proktor" class="section">
  <h2>Manajemen Proktor</h2>
  <input id="filterKecamatan" placeholder="Filter Kecamatan">
  <button onclick="loadProktor()">Tampilkan</button>

  <h3>Tambah Proktor</h3>
  <input id="pEmail" placeholder="Email">
  <input id="pPass" placeholder="Password">
  <input id="pNama" placeholder="Nama">
  <input id="pLembaga" placeholder="Kode Lembaga">
  <input id="pKecamatan" placeholder="Kecamatan">
  <button onclick="addProktor()">Tambah</button>

  <h3>Import Proktor (Excel)</h3>
  <input type="file" id="excelProktor" accept=".xlsx">
  <button onclick="importProktor()">Import</button>

  <table>
    <thead><tr><th>Email</th><th>Nama</th><th>Lembaga</th><th>Kecamatan</th></tr></thead>
    <tbody id="tblProktor"></tbody>
  </table>
</div>

<!-- BANK SOAL (EDITOR FINAL) -->
<div id="banksoal" class="section">
<h2>Bank Soal ANBK</h2>

<select id="domainSoal">
  <option value="">-- Pilih Domain --</option>
  <option value="literasi">Literasi</option>
  <option value="numerasi">Numerasi</option>
</select>

<button onclick="toggleTes()">Aktifkan Tes</button>
<span id="indikatorTes" class="status red">● Tidak Aktif</span>

<br><br>

<input type="file" id="excelSoal" accept=".xlsx">
<button onclick="importSoal()">Import Soal</button>

<table>
<thead>
<tr>
  <th>No</th>
  <th>Pertanyaan</th>
  <th>A</th>
  <th>B</th>
  <th>C</th>
  <th>D</th>
  <th>Jawaban</th>
  <th>Gambar Soal</th>
</tr>
</thead>
<tbody id="tblSoal"></tbody>
</table>
</div>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzhYhmgEliEpmgfyGGeM4iYnQSnLMrPJaRaPfws-wXy36NAXdJ5Z4AbLUDyzliW3Ios_w/exec";
const overlay=document.getElementById("overlay");
adminEmail.innerText=localStorage.getItem("email");

function showLoading(){overlay.style.display="flex"}
function hideLoading(){overlay.style.display="none"}

function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
  document.querySelectorAll("aside a").forEach(a=>a.classList.remove("active"));
  event.target.classList.add("active");
}

/* BANK SOAL LOAD */
function loadSoal(){
  fetch(API_URL+"?action=getBankSoal&domain="+domainSoal.value)
  .then(r=>r.json()).then(d=>{
    tblSoal.innerHTML="";
    d.data.forEach((s,i)=>{
      tblSoal.innerHTML+=`
      <tr>
        <td>${i+1}</td>
        <td><textarea>${s.pertanyaan}</textarea></td>
        <td><input value="${s.A||""}"></td>
        <td><input value="${s.B||""}"></td>
        <td><input value="${s.C||""}"></td>
        <td><input value="${s.D||""}"></td>
        <td>
          <select>
            <option ${s.kunci=="A"?"selected":""}>A</option>
            <option ${s.kunci=="B"?"selected":""}>B</option>
            <option ${s.kunci=="C"?"selected":""}>C</option>
            <option ${s.kunci=="D"?"selected":""}>D</option>
            <option ${s.kunci=="A,C"?"selected":""}>A,C</option>
          </select>
        </td>
        <td>
          ${s.gambar?`<img src="${s.gambar}" width="60"><br>`:""}
          <input value="${s.gambar||""}" placeholder="URL gambar">
        </td>
      </tr>`;
    });
  });
}
domainSoal.onchange=loadSoal;

function importSoal(){
  const f=excelSoal.files[0];
  if(!f)return;
  showLoading();
  const r=new FileReader();
  r.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:"binary"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const data=XLSX.utils.sheet_to_json(ws);
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"importSoal",data})})
    .then(()=>{hideLoading();loadSoal();});
  };
  r.readAsBinaryString(f);
}
</script>

</body>
</html>
