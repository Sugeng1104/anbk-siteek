<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin ANBK | Dashboard Nasional</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:#eef1f5;color:#333}
header{background:#1e3a8a;color:white;padding:18px 28px;display:flex;justify-content:space-between;align-items:center}
header h1{margin:0;font-size:20px}
header .user{font-size:13px;opacity:.9}
.layout{display:flex;min-height:calc(100vh - 64px)}
aside{width:260px;background:#fff;border-right:1px solid #ddd;padding:22px 0}
aside h3{margin:0 24px 12px;font-size:12px;color:#666;text-transform:uppercase}
aside a{display:block;padding:12px 24px;color:#333;text-decoration:none;cursor:pointer}
aside a.active,aside a:hover{background:#eef5ff;color:#1e3a8a;font-weight:600}
main{flex:1;padding:28px}
.section{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.08);margin-top:20px;display:none}

table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
th,td{border:1px solid #ddd;padding:8px;text-align:center;vertical-align:top}
th{background:#f4f6fa}

input,select,textarea{padding:6px;font-size:12px;width:100%}
textarea{min-height:70px}

button{padding:6px 12px;font-size:12px;background:#1e3a8a;color:white;border:none;border-radius:6px;cursor:pointer}

.upload-btn{margin-top:4px;background:#059669;width:100%}

.indicator{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-weight:bold;
}
.dot{
  width:10px;height:10px;border-radius:50%;
  display:inline-block;
}
.dot.red{background:#b00020}
.dot.green{background:#059669}
</style>
</head>

<body>

<header>
  <h1>ADMIN ANBK – DASHBOARD NASIONAL</h1>
  <div class="user"><span id="adminEmail"></span> | Admin ANBK</div>
</header>

<div class="layout">

<aside>
  <h3>Menu Admin</h3>
  <a class="active" onclick="showSection('dashboard')">Dashboard</a>
  <a onclick="showSection('proktor')">Manajemen Proktor</a>
  <a onclick="showSection('banksoal')">Bank Soal</a>
  <a onclick="logout()">Logout</a>
</aside>

<main>

<!-- DASHBOARD -->
<div id="dashboard" class="section" style="display:block">
  <h2>Dashboard</h2>
</div>

<!-- PROKTOR -->
<div id="proktor" class="section">
  <h2>Manajemen Proktor</h2>
</div>

<!-- ================= BANK SOAL ================= -->
<div id="banksoal" class="section">

<h2>📘 Bank Soal ANBK</h2>

<!-- BARIS KONTROL -->
<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">

  <select id="domainSoal" onchange="loadSoal()" style="max-width:220px">
    <option value="">-- Pilih Domain --</option>
    <option value="literasi">Literasi</option>
    <option value="numerasi">Numerasi</option>
  </select>

  <button onclick="toggleTes()">Aktifkan Tes</button>

  <div id="indikator" class="indicator">
    <span class="dot red"></span>
    <span>Tidak Aktif</span>
  </div>

</div>

<!-- IMPORT EXCEL -->
<div style="margin-top:12px">
  <input type="file" id="excelSoal" accept=".xlsx">
  <button onclick="importSoal()">Import Soal</button>
</div>

<!-- TABEL SOAL -->
<table>
<thead>
<tr>
  <th>No</th>
  <th>Pertanyaan</th>
  <th>A</th>
  <th>B</th>
  <th>C</th>
  <th>D</th>
  <th>Jawaban</th>
  <th>Gambar Soal</th>
</tr>
</thead>
<tbody id="tblSoal"></tbody>
</table>

</div>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzhYhmgEliEpmgfyGGeM4iYnQSnLMrPJaRaPfws-wXy36NAXdJ5Z4AbLUDyzliW3Ios_w/exec";
adminEmail.innerText=localStorage.getItem("email");

function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

/* BANK SOAL LOAD */
function loadSoal(){
  fetch(API_URL+"?action=getBankSoal&domain="+domainSoal.value)
  .then(r=>r.json())
  .then(d=>{
    tblSoal.innerHTML="";
    d.data.forEach((s,i)=>{
      tblSoal.innerHTML+=`
<tr>
<td>${i+1}</td>
<td><textarea>${s.pertanyaan||""}</textarea></td>

${["A","B","C","D"].map(k=>`
<td>
  <input value="${s[k]||""}">
  <input type="file" class="upload-btn" onchange="uploadImage(this)">
</td>`).join("")}

<td>
<select>
<option ${s.kunci=="A"?"selected":""}>A</option>
<option ${s.kunci=="B"?"selected":""}>B</option>
<option ${s.kunci=="C"?"selected":""}>C</option>
<option ${s.kunci=="D"?"selected":""}>D</option>
<option ${s.kunci=="A,C"?"selected":""}>A,C</option>
</select>
</td>

<td>
${s.gambar?`<img src="${s.gambar}" width="60"><br>`:""}
<input value="${s.gambar||""}">
<input type="file" class="upload-btn" onchange="uploadImage(this)">
</td>
</tr>`;
    });
  });
}

/* UPLOAD GAMBAR */
function uploadImage(inp){
  const f=inp.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=e=>{
    fetch(API_URL,{
      method:"POST",
      body:JSON.stringify({
        action:"uploadImage",
        filename:f.name,
        base64:e.target.result.split(",")[1]
      })
    })
    .then(r=>r.json())
    .then(j=>{
      if(j.success){
        inp.previousElementSibling.value=j.url;
      }else{
        alert("Upload gagal");
      }
    });
  };
  r.readAsDataURL(f);
}

/* IMPORT SOAL */
function importSoal(){
  const f=excelSoal.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:"binary"});
    const data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"importSoal",data})})
    .then(()=>loadSoal());
  };
  r.readAsBinaryString(f);
}

/* AKTIFKAN TES */
let aktif=false;
function toggleTes(){
  aktif=!aktif;
  indikator.innerHTML = aktif
    ? '<span class="dot green"></span><span>Aktif</span>'
    : '<span class="dot red"></span><span>Tidak Aktif</span>';
}

function logout(){
  localStorage.clear();
  location.href="login.html";
}
</script>

</body>
</html>
