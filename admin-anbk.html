<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin ANBK | Dashboard Nasional</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:#eef1f5;color:#333}

/* HEADER */
header{
  background:#1e3a8a;
  color:#fff;
  padding:18px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center
}
header h1{margin:0;font-size:20px}
header .user{font-size:13px;opacity:.9}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 64px)}
aside{
  width:260px;background:#fff;border-right:1px solid #ddd;padding:22px 0
}
aside h3{margin:0 24px 12px;font-size:12px;color:#666;text-transform:uppercase}
aside a{
  display:block;padding:12px 24px;color:#333;
  cursor:pointer;text-decoration:none
}
aside a.active,aside a:hover{
  background:#eef5ff;color:#1e3a8a;font-weight:600
}
main{flex:1;padding:28px}

/* SECTION */
.section{
  background:#fff;border-radius:10px;padding:20px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  margin-top:20px;display:none
}

/* DASHBOARD */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px
}
.card{
  background:#fff;border-radius:10px;padding:20px;
  box-shadow:0 2px 6px rgba(0,0,0,.08)
}
.card .value{
  font-size:26px;font-weight:600;color:#1e3a8a
}

/* TABLE */
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
th,td{border:1px solid #ddd;padding:8px;text-align:center;vertical-align:top}
th{background:#f4f6fa}

/* FORM */
input,select,textarea{padding:6px;font-size:12px;width:100%}
textarea{min-height:70px}

/* BUTTON */
button{
  padding:6px 14px;
  font-size:12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#1e3a8a;
  color:#fff;
  transition:all .2s ease;
}
button:hover{
  background:#163172;
  transform:translateY(-1px);
  box-shadow:0 4px 10px rgba(0,0,0,.2);
}
button:active{
  transform:scale(.97);
}

/* UPLOAD BUTTON */
.upload-btn{margin-top:4px;background:#059669}

/* CONTROL */
.control-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.indicator{display:flex;align-items:center;gap:6px;font-weight:bold}
.dot{width:10px;height:10px;border-radius:50%}
.dot.red{background:#b00020}
.dot.green{background:#059669}

/* LOADING OVERLAY */
.overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(255,255,255,.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999
}
.spinner{
  width:60px;height:60px;
  border:6px solid #ccc;
  border-top:6px solid #1e3a8a;
  border-radius:50%;
  animation:spin 1s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}

/* SUCCESS */
.success-box{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:30px 40px;
  border-radius:14px;
  box-shadow:0 8px 30px rgba(0,0,0,.25);
  display:none;
  text-align:center;
  z-index:10000
}
.success-box .check{
  font-size:52px;
  color:#059669
}
</style>
</head>

<body>

<!-- LOADING -->
<div class="overlay" id="overlay">
  <div class="spinner"></div>
</div>

<!-- SUCCESS -->
<div class="success-box" id="successBox">
  <div class="check">✅</div>
  <div style="margin-top:10px;font-weight:bold">Import Berhasil</div>
</div>

<audio id="tingSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<header>
  <h1>ADMIN ANBK – DASHBOARD NASIONAL</h1>
  <div class="user"><span id="adminEmail"></span> | Admin ANBK</div>
</header>

<div class="layout">
<aside>
  <h3>Menu Admin</h3>
  <a class="active" onclick="showSection('dashboard')">Dashboard</a>
  <a onclick="showSection('proktor')">Manajemen Proktor</a>
  <a onclick="showSection('banksoal')">Bank Soal</a>
  <a onclick="logout()">Logout</a>
</aside>

<main>

<!-- DASHBOARD -->
<div id="dashboard" class="section" style="display:block">
  <div class="cards">
    <div class="card"><h4>Total Proktor</h4><div class="value" id="totalProktor">-</div></div>
    <div class="card"><h4>Peserta Aktif</h4><div class="value" id="pesertaAktif">-</div></div>
  </div>
</div>

<!-- BANK SOAL -->
<div id="banksoal" class="section">
<h2>📘 Bank Soal ANBK</h2>

<div class="control-row">
  <select id="domainSoal" onchange="loadSoal()">
    <option value="">-- Pilih Domain --</option>
    <option value="literasi">Literasi</option>
    <option value="numerasi">Numerasi</option>
  </select>

  <button onclick="toggleTes()">Aktifkan Tes</button>

  <div id="indikator" class="indicator">
    <span class="dot red"></span> Tidak Aktif
  </div>
</div>

<div style="margin-top:12px">
  <input type="file" id="excelSoal" accept=".xlsx">
  <button onclick="importSoal()">Import Soal</button>
</div>

<table>
<thead>
<tr>
  <th>No</th><th>Pertanyaan</th>
  <th>A</th><th>B</th><th>C</th><th>D</th>
  <th>Jawaban</th><th>Gambar Soal</th>
</tr>
</thead>
<tbody id="tblSoal"></tbody>
</table>
</div>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
const API_URL="https://script.google.com/macros/s/AKfycbzhYhmgEliEpmgfyGGeM4iYnQSnLMrPJaRaPfws-wXy36NAXdJ5Z4AbLUDyzliW3Ios_w/exec";
adminEmail.innerText=localStorage.getItem("email");

/* MENU */
function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

/* DASHBOARD */
fetch(API_URL+"?action=adminStats")
.then(r=>r.json()).then(d=>{
  totalProktor.innerText=d.totalProktor;
  pesertaAktif.innerText=d.pesertaAktif||0;
});

/* IMPORT SOAL – FINAL */
function importSoal(){
  const f = excelSoal.files[0];
  if(!f) return alert("Pilih file Excel");

  overlay.style.display="flex";

  const r = new FileReader();
  r.onload = e=>{
    const wb = XLSX.read(e.target.result,{type:"binary"});
    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

    fetch(API_URL,{
      method:"POST",
      body:JSON.stringify({action:"importSoal",data})
    }).then(()=>{
      overlay.style.display="none";
      successBox.style.display="block";
      tingSound.play();
      setTimeout(()=>{
        successBox.style.display="none";
        loadSoal();
      },1500);
    });
  };
  r.readAsBinaryString(f);
}

/* BANK SOAL */
function loadSoal(){
  fetch(API_URL+"?action=getBankSoal&domain="+domainSoal.value)
  .then(r=>r.json()).then(d=>{
    tblSoal.innerHTML="";
    d.data.forEach((s,i)=>{
      tblSoal.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${s.pertanyaan}</td>
<td>${s.A||""}</td>
<td>${s.B||""}</td>
<td>${s.C||""}</td>
<td>${s.D||""}</td>
<td>${s.kunci||""}</td>
<td>${s.gambar?'<img src="'+s.gambar+'" width="60">':'-'}</td>
</tr>`;
    });
  });
}

/* AKTIFKAN TES */
let aktif=false;
function toggleTes(){
  aktif=!aktif;
  indikator.innerHTML = aktif
    ? '<span class="dot green"></span> Aktif'
    : '<span class="dot red"></span> Tidak Aktif';
}

function logout(){
  localStorage.clear();
  location.href="login.html";
}
</script>

</body>
</html>
