<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin ANBK | Bank Soal</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
body{font-family:Segoe UI;background:#eef1f5;margin:0}
header{background:#1e3a8a;color:white;padding:16px 24px;font-size:18px}
.container{padding:24px}
.card{background:white;border-radius:10px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
button{padding:8px 14px;border:none;border-radius:6px;background:#1e3a8a;color:white}
select,input{padding:8px;margin-right:8px}
table{width:100%;border-collapse:collapse;margin-top:16px}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
th{background:#f4f6fa}
.status{font-weight:bold}
.green{color:#059669}
.red{color:#b00020}
</style>
</head>

<body>

<header>ADMIN ANBK – BANK SOAL</header>

<div class="container">

<div class="card">

<select id="domain">
  <option value="">-- Pilih Domain --</option>
  <option value="literasi">Literasi</option>
  <option value="numerasi">Numerasi</option>
</select>

<button onclick="toggle()">Aktifkan Tes</button>
<span id="indikator" class="status red">● Tidak Aktif</span>

<hr>

<input type="file" id="excel" accept=".xlsx">
<button onclick="importExcel()">Import Soal</button>

<table>
<thead>
<tr>
<th>No</th><th>Pertanyaan</th><th>Jawaban</th><th>Gambar</th>
</tr>
</thead>
<tbody id="tbl"></tbody>
</table>

</div>

</div>

https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.jsscript>

<script>
const API="https://script.google.com/macros/s/AKfycbzhYhmgEliEpmgfyGGeM4iYnQSnLMrPJaRaPfws-wXy36NAXdJ5Z4AbLUDyzliW3Ios_w/exec";
let aktif=false;

function toggle(){
  aktif=!aktif;
  indikator.innerText=aktif?"● Aktif":"● Tidak Aktif";
  indikator.className="status "+(aktif?"green":"red");
  fetch(API+"?action=toggleTes&status="+(aktif?"aktif":"nonaktif"));
}

function load(){
  fetch(API+"?action=getBankSoal&domain="+domain.value)
  .then(r=>r.json()).then(d=>{
    tbl.innerHTML="";
    d.data.forEach((s,i)=>{
      tbl.innerHTML+=`
      <tr>
        <td>${i+1}</td>
        <td>${s.pertanyaan}</td>
        <td>${s.jawaban}</td>
        <td>${s.gambar?'<img src="'+s.gambar+'" width=60>':'-'}</td>
      </tr>`;
    });
  });
}
domain.onchange=load;

function importExcel(){
  const f=excel.files[0];
  if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:"binary"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const data=XLSX.utils.sheet_to_json(ws);
    fetch(API,{
      method:"POST",
      body:JSON.stringify({action:"importSoal",data:data})
    }).then(()=>{alert("Import sukses");load();});
  }
  r.readAsBinaryString(f);
}
</script>

</body>
</html>
``
