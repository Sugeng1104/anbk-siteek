<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin ANBK | Dashboard Nasional</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:#eef1f5;color:#333}

/* HEADER */
header{
  background:#1e3a8a;color:#fff;
  padding:18px 28px;
  display:flex;justify-content:space-between;align-items:center
}
header h1{margin:0;font-size:20px}
header .user{font-size:13px;opacity:.9}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 64px)}
aside{
  width:260px;background:#fff;border-right:1px solid #ddd;padding:22px 0
}
aside h3{margin:0 24px 12px;font-size:12px;color:#666;text-transform:uppercase}
aside a{
  display:block;padding:12px 24px;color:#333;
  cursor:pointer;text-decoration:none
}
aside a.active,aside a:hover{
  background:#eef5ff;color:#1e3a8a;font-weight:600
}
main{flex:1;padding:28px}

/* SECTION */
.section{
  background:#fff;border-radius:10px;padding:20px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  margin-top:20px;display:none
}

/* DASHBOARD */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px
}
.card{
  background:#fff;border-radius:10px;padding:20px;
  box-shadow:0 2px 6px rgba(0,0,0,.08)
}
.card .value{font-size:26px;font-weight:600;color:#1e3a8a}

/* TABLE */
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
th,td{border:1px solid #ddd;padding:8px;text-align:center;vertical-align:top}
th{background:#f4f6fa}

/* FORM */
input,select{padding:6px;font-size:12px}
button{
  padding:6px 14px;font-size:12px;border:none;
  border-radius:6px;background:#1e3a8a;color:#fff;
  cursor:pointer
}

/* CONTROL */
.control-row{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px
}

/* LOADING */
.overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(255,255,255,.8);
  display:none;align-items:center;justify-content:center;
  z-index:9999
}
.spinner{
  width:60px;height:60px;border:6px solid #ccc;
  border-top:6px solid #1e3a8a;border-radius:50%;
  animation:spin 1s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}

/* BATASI LEBAR OPSI */
#tblSoal td:nth-child(3),
#tblSoal td:nth-child(4),
#tblSoal td:nth-child(5),
#tblSoal td:nth-child(6),
#tblSoal td:nth-child(8){
  width:120px;
  max-width:120px;
}
#tblSoal img{max-width:80px}
</style>
</head>

<body>

<div class="overlay" id="overlay"><div class="spinner"></div></div>

<header>
  <h1>ADMIN ANBK – DASHBOARD NASIONAL</h1>
  <div class="user"><span id="adminEmail"></span> | Admin</div>
</header>

<div class="layout">
<aside>
  <h3>Menu Admin</h3>
  <a class="active" onclick="showSection('dashboard')">Dashboard</a>
  <a onclick="showSection('proktor')">Manajemen Proktor</a>
  <a onclick="showSection('banksoal')">Bank Soal</a>
  <a onclick="logout()">Logout</a>
</aside>

<main>

<!-- DASHBOARD -->
<div id="dashboard" class="section" style="display:block">
  <div class="cards">
    <div class="card"><h4>Total Proktor</h4><div class="value" id="totalProktor">-</div></div>
    <div class="card"><h4>Peserta Aktif</h4><div class="value" id="pesertaAktif">-</div></div>
  </div>
</div>

<!-- PROKTOR -->
<div id="proktor" class="section">
  <h2>Manajemen Proktor</h2>
  <table>
    <thead><tr><th>Email</th><th>Nama</th><th>Lembaga</th><th>Kecamatan</th></tr></thead>
    <tbody id="tblProktor"></tbody>
  </table>
</div>

<!-- BANK SOAL -->
<div id="banksoal" class="section">
<h2>📘 Bank Soal ANBK</h2>

<div class="control-row">
  <select id="filterDomain">
    <option value="">-- Pilih Domain --</option>
    <option value="literasi">Literasi</option>
    <option value="numerasi">Numerasi</option>
  </select>
  <button onclick="bukaSoal()">Buka</button>
</div>

<table>
<thead>
<tr>
  <th>No</th><th>Pertanyaan</th>
  <th>A</th><th>B</th><th>C</th><th>D</th>
  <th>Jawaban</th><th>Gambar</th>
</tr>
</thead>
<tbody id="tblSoal"></tbody>
</table>
</div>

</main>
</div>

<script>
/* ================= CONFIG ================= */
const API_URL = "PASTE_URL_WEB_APP_APPS_SCRIPT_DI_SINI";
const CDN = "https://cdn.jsdelivr.net/gh/sugeng1104/anbk-siteek@main/img/";
adminEmail.innerText = localStorage.getItem("email");

/* ================= MENU ================= */
function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

/* ================= DASHBOARD ================= */
fetch(API_URL+"?action=adminStats").then(r=>r.json()).then(d=>{
  totalProktor.innerText=d.totalProktor;
  pesertaAktif.innerText=d.pesertaAktif||0;
});

/* ================= PROKTOR ================= */
fetch(API_URL+"?action=getProktor").then(r=>r.json()).then(d=>{
  tblProktor.innerHTML="";
  d.data.forEach(p=>{
    tblProktor.innerHTML+=`<tr>
      <td>${p.email}</td><td>${p.nama}</td>
      <td>${p.lembaga}</td><td>${p.kecamatan}</td>
    </tr>`;
  });
});

/* ================= BANK SOAL ================= */
function bukaSoal(){
  const domain = filterDomain.value;
  if(!domain){alert("Pilih domain");return;}

  overlay.style.display="flex";

  fetch(API_URL+"?action=getBankSoal&domain="+domain)
  .then(r=>r.json())
  .then(d=>{
    overlay.style.display="none";
    tblSoal.innerHTML="";
    d.data.forEach((s,i)=>{
      tblSoal.innerHTML+=`
      <tr>
        <td>${i+1}</td>
        <td>${s.pertanyaan}</td>
        <td>${renderOpsi(s.A,s.no,"A")}</td>
        <td>${renderOpsi(s.B,s.no,"B")}</td>
        <td>${renderOpsi(s.C,s.no,"C")}</td>
        <td>${renderOpsi(s.D,s.no,"D")}</td>
        <td>${s.kunci}</td>
        <td>${renderGambar(s.gambar,s.no)}</td>
      </tr>`;
    });
  });
}

/* ================= RENDER ================= */
function renderGambar(val,id){
  if(!val){
    return `<input type="file" id="file_${id}">
            <button onclick="uploadSoal(${id})">Kirim</button>`;
  }
  return `<img src="${CDN+val}">`;
}

function renderOpsi(val,id,o){
  if(!val){
    return `<input type="file" id="opsi_${o}_${id}">
            <button onclick="uploadOpsi(${id},'${o}')">Kirim</button>`;
  }
  if(val.endsWith(".png")) return `<img src="${CDN+val}">`;
  return val;
}

/* ================= BLIND UPLOAD (NO-CORS) ================= */
function uploadSoal(id){
  const f=document.getElementById("file_"+id).files[0];
  if(!f){alert("Pilih file");return;}
  const r=new FileReader();
  overlay.style.display="flex";
  r.onload=e=>{
    fetch(API_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        action:"uploadImage",
        id_soal:id,
        path:`img/soal_${id}.png`,
        content:e.target.result
      })
    }).then(()=>{
      overlay.style.display="none";
      alert("✅ Gambar dikirim, cek hasilnya");
      bukaSoal();
    });
  };
  r.readAsDataURL(f);
}

function uploadOpsi(id,o){
  const f=document.getElementById(`opsi_${o}_${id}`).files[0];
  if(!f){alert("Pilih file");return;}
  const r=new FileReader();
  overlay.style.display="flex";
  r.onload=e=>{
    fetch(API_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        action:"uploadOpsiGambar",
        id_soal:id,
        opsi:o,
        content:e.target.result
      })
    }).then(()=>{
      overlay.style.display="none";
      alert("✅ Opsi dikirim");
      bukaSoal();
    });
  };
  r.readAsDataURL(f);
}

function logout(){
  localStorage.clear();
  location.href="login.html";
}
</script>
</body>
</html>
