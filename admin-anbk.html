<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin ANBK | Dashboard Nasional</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:#eef1f5;color:#333}

/* ===== HEADER ===== */
header{
  background:#1e3a8a;color:#fff;
  padding:18px 28px;
  display:flex;justify-content:space-between;align-items:center
}
header h1{margin:0;font-size:20px}
header .user{font-size:13px;opacity:.9}

/* ===== LAYOUT ===== */
.layout{display:flex;min-height:calc(100vh - 64px)}
aside{
  width:260px;background:#fff;border-right:1px solid #ddd;padding:22px 0
}
aside h3{margin:0 24px 12px;font-size:12px;color:#666;text-transform:uppercase}
aside a{
  display:block;padding:12px 24px;color:#333;
  cursor:pointer;text-decoration:none
}
aside a.active,aside a:hover{
  background:#eef5ff;color:#1e3a8a;font-weight:600
}
main{flex:1;padding:28px}

/* ===== SECTION ===== */
.section{
  background:#fff;border-radius:10px;padding:20px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  margin-top:20px;display:none
}

/* ===== DASHBOARD ===== */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px
}
.card{
  background:#fff;border-radius:10px;
  padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.08)
}
.card .value{font-size:26px;font-weight:600;color:#1e3a8a}

/* ===== TABLE ===== */
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
th,td{border:1px solid #ddd;padding:8px;text-align:center;vertical-align:top}
th{background:#f4f6fa}

/* ===== FORM ===== */
input,select,textarea{padding:6px;font-size:12px}
textarea{min-height:60px}
button{
  padding:6px 14px;font-size:12px;
  border:none;border-radius:6px;
  background:#1e3a8a;color:#fff;
  cursor:pointer
}
button:hover{background:#163172}

/* ===== ICON UPLOAD ===== */
.upload-icon{
  margin-left:6px;
  font-size:12px;
  padding:2px 6px;
  cursor:pointer;
  background:#e9eefb;
  border:1px solid #cfd8ff;
  border-radius:4px
}
.upload-icon:hover{background:#dbe5ff}

/* ===== OVERLAY ===== */
.overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(255,255,255,.8);
  display:none;align-items:center;justify-content:center;
  z-index:9999
}
.spinner{
  width:60px;height:60px;
  border:6px solid #ccc;border-top:6px solid #1e3a8a;
  border-radius:50%;animation:spin 1s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="overlay" id="overlay"><div class="spinner"></div></div>

<header>
  <h1>ADMIN ANBK – DASHBOARD NASIONAL</h1>
  <div class="user"><span id="adminEmail"></span> | Admin ANBK</div>
</header>

<div class="layout">
<aside>
  <h3>Menu Admin</h3>
  <a class="active" onclick="showSection('dashboard')">Dashboard</a>
  <a onclick="showSection('proktor')">Manajemen Proktor</a>
  <a onclick="showSection('banksoal')">Bank Soal</a>
  <a onclick="logout()">Logout</a>
</aside>

<main>

<!-- DASHBOARD -->
<div id="dashboard" class="section" style="display:block">
  <div class="cards">
    <div class="card"><h4>Total Proktor</h4><div class="value" id="totalProktor">-</div></div>
    <div class="card"><h4>Peserta Aktif</h4><div class="value" id="pesertaAktif">-</div></div>
  </div>
</div>

<!-- PROKTOR -->
<div id="proktor" class="section">
  <h2>Manajemen Proktor</h2>

  <input id="filterKecamatan" placeholder="Filter Kecamatan">
  <button onclick="loadProktor()">Tampilkan</button>

  <h3>Tambah Proktor</h3>
  <input id="pEmail" placeholder="Email">
  <input id="pPass" placeholder="Password">
  <input id="pNama" placeholder="Nama">
  <input id="pLembaga" placeholder="Kode Lembaga">
  <input id="pKecamatan" placeholder="Kecamatan">
  <button onclick="addProktor()">Tambah</button>

  <h3>Import Proktor</h3>
  <input type="file" id="excelProktor">
  <button onclick="importProktor()">Import</button>

  <table>
    <thead>
      <tr><th>Email</th><th>Nama</th><th>Lembaga</th><th>Kecamatan</th></tr>
    </thead>
    <tbody id="tblProktor"></tbody>
  </table>
</div>

<!-- BANK SOAL -->
<div id="banksoal" class="section">
<h2>📘 Bank Soal ANBK</h2>

<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
  <input type="file" id="excelSoal" accept=".xlsx">
  <button onclick="importSoal()">Import Soal</button>

  <select id="filterDomain">
    <option value="">-- Pilih Domain --</option>
    <option value="literasi">Literasi</option>
    <option value="numerasi">Numerasi</option>
  </select>

  <button onclick="bukaSoal()">Buka</button>
</div>

<table>
<thead>
<tr>
  <th>No</th>
  <th>Pertanyaan</th>
  <th>A</th>
  <th>B</th>
  <th>C</th>
  <th>D</th>
  <th>Jawaban</th>
  <th>Gambar Soal</th>
</tr>
</thead>
<tbody id="tblSoal"></tbody>
</table>
</div>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
const API_URL="https://script.google.com/macros/s/AKfycbzhYhmgEliEpmgfyGGeM4iYnQSnLMrPJaRaPfws-wXy36NAXdJ5Z4AbLUDyzliW3Ios_w/exec";
const overlay=document.getElementById("overlay");
adminEmail.innerText=localStorage.getItem("email");

function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

/* DASHBOARD */
fetch(API_URL+"?action=adminStats")
.then(r=>r.json()).then(d=>{
  totalProktor.innerText=d.totalProktor;
  pesertaAktif.innerText=d.pesertaAktif||0;
});

/* PROKTOR */
function loadProktor(){
  fetch(API_URL+"?action=getProktor")
  .then(r=>r.json()).then(d=>{
    tblProktor.innerHTML="";
    d.data.forEach(p=>{
      tblProktor.innerHTML+=`
      <tr><td>${p.email}</td><td>${p.nama}</td><td>${p.lembaga}</td><td>${p.kecamatan}</td></tr>`;
    });
  });
}
loadProktor();

function addProktor(){
  fetch(API_URL,{method:"POST",body:JSON.stringify({
    action:"addProktor",
    email:pEmail.value,password:pPass.value,
    nama:pNama.value,kode_lembaga:pLembaga.value,
    kecamatan:pKecamatan.value
  })}).then(loadProktor);
}

function importProktor(){
  const f=excelProktor.files[0];
  const r=new FileReader();
  r.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:"binary"});
    const data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"importProktor",data})})
    .then(loadProktor);
  };
  r.readAsBinaryString(f);
}

/* BANK SOAL */
function bukaSoal(){
  const domain=filterDomain.value;
  if(!domain){alert("Pilih domain");return;}

  overlay.style.display="flex";

  fetch(API_URL+"?action=getBankSoal&domain="+domain)
  .then(r=>r.json())
  .then(d=>{
    overlay.style.display="none";
    tblSoal.innerHTML="";

    d.data.forEach((s,i)=>{
      tblSoal.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${s.pertanyaan}</td>

<td>${s.A||"-"} <span class="upload-icon" onclick="openUpload()">📷</span></td>
<td>${s.B||"-"} <span class="upload-icon" onclick="openUpload()">📷</span></td>
<td>${s.C||"-"} <span class="upload-icon" onclick="openUpload()">📷</span></td>
<td>${s.D||"-"} <span class="upload-icon" onclick="openUpload()">📷</span></td>

<td>${s.kunci||"-"}</td>

<td>
  ${s.gambar?'<img src="'+s.gambar+'" width="50"><br>':'-'}
  <span class="upload-icon" onclick="openUpload()">📷</span>
</td>
</tr>`;
    });
  });
}

function openUpload(){
  const input=document.createElement("input");
  input.type="file";
  input.accept="image/*";
  input.onchange=()=>uploadGambar(input.files[0]);
  input.click();
}

function uploadGambar(file){
  if(!file)return;
  overlay.style.display="flex";
  const r=new FileReader();
  r.onload=e=>{
    fetch(API_URL,{
      method:"POST",
      body:JSON.stringify({
        action:"uploadImage",
        filename:file.name,
        base64:e.target.result.split(",")[1]
      })
    })
    .then(r=>r.json())
    .then(res=>{
      overlay.style.display="none";
      if(res.success){
        alert("Upload berhasil");
      }else{
        alert("Upload gagal");
      }
    });
  };
  r.readAsDataURL(file);
}

function importSoal(){
  const f=excelSoal.files[0];
  if(!f){alert("Pilih file");return;}
  overlay.style.display="flex";
  const r=new FileReader();
  r.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:"binary"});
    const data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"importSoal",data})})
    .then(()=>{
      overlay.style.display="none";
      bukaSoal();
    });
  };
  r.readAsBinaryString(f);
}

function logout(){
  localStorage.clear();
  location.href="login.html";
}
</script>

</body>
</html>
