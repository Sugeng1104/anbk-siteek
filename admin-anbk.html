<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin ANBK | Dashboard Nasional</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:#eef1f5;color:#333}
header{background:#1e3a8a;color:#fff;padding:18px 28px;display:flex;justify-content:space-between;align-items:center}
header h1{margin:0;font-size:20px}
.layout{display:flex;min-height:calc(100vh - 64px)}
aside{width:260px;background:#fff;border-right:1px solid #ddd;padding:22px 0}
aside a{display:block;padding:12px 24px;color:#333;cursor:pointer;text-decoration:none}
aside a.active,aside a:hover{background:#eef5ff;color:#1e3a8a;font-weight:600}
main{flex:1;padding:28px}
.section{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.08);margin-top:20px;display:none}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}
th,td{border:1px solid #ddd;padding:6px;text-align:center;vertical-align:top}
th{background:#f4f6fa}
button{padding:5px 10px;font-size:11px;border:none;border-radius:5px;background:#1e3a8a;color:#fff;cursor:pointer}
input[type=file]{font-size:11px}
img{border-radius:6px}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.8);display:none;align-items:center;justify-content:center;z-index:9999}
.spinner{width:60px;height:60px;border:6px solid #ccc;border-top:6px solid #1e3a8a;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="overlay" id="overlay"><div class="spinner"></div></div>

<header>
  <h1>ADMIN ANBK – DASHBOARD NASIONAL</h1>
  <div><span id="adminEmail"></span></div>
</header>

<div class="layout">
<aside>
  <a class="active" onclick="showSection('banksoal')">Bank Soal</a>
  <a onclick="logout()">Logout</a>
</aside>

<main>

<div id="banksoal" class="section" style="display:block">
<h2>📘 Bank Soal ANBK</h2>

<select id="filterDomain">
  <option value="">-- Pilih Domain --</option>
  <option value="literasi">Literasi</option>
  <option value="numerasi">Numerasi</option>
</select>
<button onclick="bukaSoal()">Buka</button>

<table>
<thead>
<tr>
  <th>No</th>
  <th>Pertanyaan</th>
  <th>A</th><th>B</th><th>C</th><th>D</th>
  <th>Jawaban</th>
  <th>Gambar Soal</th>
</tr>
</thead>
<tbody id="tblSoal"></tbody>
</table>
</div>

</main>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzhYhmgEliEpmgfyGGeM4iYnQSnLMrPJaRaPfws-wXy36NAXdJ5Z4AbLUDyzliW3Ios_w/exec";
adminEmail.innerText=localStorage.getItem("email");

function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

function bukaSoal(){
  const domain = filterDomain.value;
  if(!domain) return alert("Pilih domain");
  overlay.style.display="flex";

  fetch(API_URL+"?action=getBankSoal&domain="+domain)
  .then(r=>r.json())
  .then(d=>{
    overlay.style.display="none";
    tblSoal.innerHTML="";
    d.data.forEach((s,i)=>{
      tblSoal.innerHTML+=`
      <tr>
        <td>${i+1}</td>
        <td>${s.pertanyaan}</td>
        <td>${s.A}</td>
        <td>${s.B}</td>
        <td>${s.C}</td>
        <td>${s.D}</td>
        <td>${s.kunci}</td>
        <td>
          ${s.gambar?`<img src="${s.gambar}" width="60"><br>`:""}
          <input type="file" id="img_${s.id}"><br>
          <button onclick="uploadGambar('${s.id}')">Kirim</button>
        </td>
      </tr>`;
    });
  });
}

function uploadGambar(id){
  const file = document.getElementById("img_"+id).files[0];
  if(!file) return alert("Pilih gambar");

  const reader = new FileReader();
  reader.onload = e=>{
    fetch(API_URL,{
      method:"POST",
      body:JSON.stringify({
        action:"uploadImage",
        id_soal:id,
        file:e.target.result,
        name:file.name
      })
    }).then(()=>bukaSoal());
  };
  reader.readAsDataURL(file);
}

function logout(){
  localStorage.clear();
  location.href="login.html";
}
</script>

</body>
</html>
