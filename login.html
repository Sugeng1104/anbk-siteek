<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login CBT Proktor / Siswa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ SUPABASE CDN (BENAR) -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }
    .box {
      width: 360px;
      margin: 100px auto;
      padding: 25px;
      background: white;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 14px;
    }
    button {
      background: #0f4c81;
      color: white;
      border: none;
      cursor: pointer;
    }
    #msg {
      margin-top: 10px;
      font-size: 13px;
      color: red;
      min-height: 16px;
    }
  </style>
</head>

<body>

<div class="box">
  <h3>LOGIN CBT</h3>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Masuk</button>
  <div id="msg"></div>
</div>

<script>
  /* ==========================
     KONFIGURASI SUPABASE
  ========================== */
  const SUPABASE_URL = "https://nbbjapiptpsszwxxafrt.supabase.co/rest/v1/";      // GANTI
  const SUPABASE_ANON_KEY = "sb_publishable_2d0f16q-n8waqycAYMG1lQ_vsssR2XK";         // GANTI

  const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  /* ==========================
     FUNGSI LOGIN
  ========================== */
  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    msg.innerText = "Memproses login...";

    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      msg.innerText = error.message;
      return;
    }

    // Ambil role dari profiles
    const { data: profile, error: pError } = await supabase
      .from("profiles")
      .select("role")
      .eq("id", data.user.id)
      .single();

    if (pError || !profile) {
      msg.innerText = "Role tidak ditemukan";
      return;
    }

    // Redirect
    if (profile.role === "proktor" || profile.role === "admin") {
      window.location.href = "proktor.html";
    } else {
      window.location.href = "token.html";
    }
  }
</script>

</body>
</html>
