<!DOCTYPE html>
<html>
<head>
  <title>Login CBT</title>
</head>
<body>

<h3>LOGIN CBT</h3>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Masuk</button>

<p id="msg"></p>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwAMuLgi9u9v7GVUypyemAOyQgrSRHjxGXgxr578dJXYDluSDK0NbpVjamilFVEL1M/exec";

async function login() {
  const email = email.value;
  const password = password.value;

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "login",
      email,
      password
    })
  });

  const json = await res.json();

  if (!json.success) {
    msg.innerText = json.message;
    return;
  }

  if (json.role === "proktor") {
    location.href = "proktor.html";
  } else {
    location.href = "ujian.html";
  }
}
</script>

</body>
</html>
