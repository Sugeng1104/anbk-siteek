<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login CBT / ANBK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ Supabase JS v2 (CDN RESMI) -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      color: #333;
    }
    .box {
      width: 360px;
      margin: 100px auto;
      padding: 25px;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }
    h3 {
      margin-top: 0;
      text-align: center;
      color: #0f4c81;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      background: #0f4c81;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #09385f; }
    #msg {
      margin-top: 10px;
      font-size: 13px;
      min-height: 16px;
      color: #b00020;
      text-align: center;
    }
    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #555;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="box">
    <h3>LOGIN CBT</h3>

    <input id="email" type="email" placeholder="Email" autocomplete="username">
    <input id="password" type="password" placeholder="Password" autocomplete="current-password">

    <button id="btnLogin">Masuk</button>
    <div id="msg"></div>
    <div class="hint">Gunakan akun Proktor atau Siswa</div>
  </div>

  <script>
    /* ===============================
       DEBUG WAJIB (JANGAN DIHAPUS)
    =============================== */
    console.log('[LOGIN] Script ter-load');

    /* ===============================
       KONFIGURASI SUPABASE (WAJIB BENAR)
       - URL TANPA /rest/v1
       - Key = anon public
    =============================== */
    const SUPABASE_URL = "https://nbbjapiptpsszwxxafrt.supabase.co"; // ✅ TANPA /rest/v1
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iYmphcGlwdHBzc3p3eHhhZnJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTcxNDMsImV4cCI6MjA5NTg3MzE0M30.88TcUDb2JLcyR8HempOiGcaQ62yczLA721HZSbQ6Qvc";  // ✅ anon public (JWT)

    const supabase = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    /* ===============================
       EVENT HANDLER (AMAN)
    =============================== */
    document.getElementById('btnLogin').addEventListener('click', login);

    async function login() {
      console.log('[LOGIN] Tombol diklik');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');

      if (!email || !password) {
        msg.style.color = '#b00020';
        msg.innerText = 'Email dan password harus diisi';
        return;
      }

      msg.style.color = '#333';
      msg.innerText = 'Memproses login…';

      try {
        // 1) Auth login
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          console.error('[LOGIN] Auth error:', error);
          msg.style.color = '#b00020';
          msg.innerText = error.message || 'Login gagal';
          return;
        }

        // 2) Ambil role dari tabel profiles
        const { data: profile, error: pError } = await supabase
          .from('profiles')
          .select('role')
          .eq('id', data.user.id)
          .single();

        if (pError || !profile) {
          console.error('[LOGIN] Profile error:', pError);
          msg.style.color = '#b00020';
          msg.innerText = 'Role tidak ditemukan (cek tabel profiles)';
          return;
        }

        // 3) Redirect sesuai role
        if (profile.role === 'proktor' || profile.role === 'admin') {
          window.location.href = 'proktor.html';
        } else {
          window.location.href = 'token.html';
        }

      } catch (e) {
        console.error('[LOGIN] Exception:', e);
        msg.style.color = '#b00020';
        msg.innerText = 'Terjadi kesalahan. Cek Console.';
      }
    }
  </script>

</body>
</html>
